<!-- FORM -->

<div id="formwrap">
  <div>
    <p style="text-align: center; color: white;">What are you observing here?<br/>Is something missing?<br/>What are you doing?<br/>How do you feel?</p>
  </div>
  <form id="form">
    <textarea name="message" placeholder=""></textarea>
    <div id="buttonwrap">
    <button type="submit">tell the world</button>
    </div>
  </form>
</div>

<!-- EYE -->

<div id="weiter">
  <a href="observations.html"><img src="img/eye.png"></a>
</div>







<script>

  // hide den anfangsstuff

  function hide(e) {
    e.preventDefault();
    document.getElementById("all").classList.add("hidden");
  }

  // FORM allgemein

  const form = document.getElementById('form')

  form.addEventListener('submit', async function(e) {
    e.preventDefault()

  await fetch('https://formspree.io/f/xvzjvkkd', {
    method: 'POST',
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  })

  form.reset()
})

// FOrm ausblenden

form.addEventListener('submit', function() {
  setTimeout(function() {
    document.getElementById('formwrap').classList.add('hidden')
    document.getElementById('weiter').classList.add('sichtbar')
  }, 500)
})

// zu den comments

  function comments() {
    document.getElementById('weiter').classList.remove('sichtbar')
  }


</script>
